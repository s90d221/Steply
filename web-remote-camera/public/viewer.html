<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Steply PC 화면</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app card">
    <div class="header">
      <div>
        <h1>Steply PC 화면</h1>
        <p>모바일에서 “컴퓨터로 영상 보내기”를 누르면 여기에 카메라 화면이 표시됩니다.</p>
      </div>
      <div id="status" class="badge">대기 중</div>
    </div>

    <section class="videoShell">
      <img id="remoteFrame" alt="모바일 카메라 영상" />
      <div id="placeholder" class="placeholder">
        <div>
          <strong>모바일 연결 대기</strong>
          <p>휴대폰에서 sender 화면을 열고 버튼을 눌러주세요.</p>
        </div>
      </div>
    </section>

    <div class="controls">
      <a id="senderLink" class="button secondary" href="/sender.html" target="_blank">모바일 송출 화면 열기</a>
    </div>

    <p class="note">같은 Wi-Fi에서 PC 주소로 접속해야 합니다. 휴대폰 카메라 권한 때문에 실제 모바일 테스트는 HTTPS 환경이 필요할 수 있습니다.</p>
  </main>

  <script src="/viewer.js"></script>
</body>
</html>
