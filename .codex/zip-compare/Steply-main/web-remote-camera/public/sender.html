<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Steply 모바일 카메라</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app card">
    <div class="header">
      <div>
        <h1>모바일 카메라</h1>
        <p>버튼을 누르면 이 휴대폰 카메라 영상이 PC 화면으로 전송됩니다.</p>
      </div>
      <div id="status" class="badge">준비</div>
    </div>

    <section class="videoShell">
      <video id="localVideo" class="smallPreview" autoplay playsinline muted></video>
      <div id="placeholder" class="placeholder">
        <div>
          <strong>카메라 꺼짐</strong>
          <p>아래 버튼을 누르면 카메라 권한을 요청합니다.</p>
        </div>
      </div>
    </section>

    <div class="controls">
      <button id="startButton">컴퓨터로 영상 보내기</button>
      <button id="stopButton" class="danger" disabled>중지</button>
    </div>

    <p class="note">권장: 휴대폰을 가로로 두고 전신이 나오게 세팅하세요. 데모용이라 영상은 저장하지 않고 실시간 프레임만 보냅니다.</p>

    <canvas id="canvas" width="640" height="360" hidden></canvas>
  </main>

  <script src="/sender.js"></script>
</body>
</html>
